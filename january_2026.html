<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>जनवरी 2026 करेंट अफेयर्स क्विज</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        padding: 0;
        color: #222;
      }

      .container {
        max-width: 950px;
        margin: 30px auto;
        background: #fff;
        padding: 24px;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      }

      h1 {
        text-align: center;
        color: #0d47a1;
        margin-bottom: 8px;
      }

      .subtitle {
        text-align: center;
        color: #555;
        margin-bottom: 24px;
      }

      .question {
        padding: 18px;
        margin-bottom: 18px;
        border: 1px solid #dbe3ee;
        border-radius: 12px;
        background: #fafcff;
      }

      .question h3 {
        margin-top: 0;
        font-size: 18px;
        color: #1a237e;
      }

      .options label {
        display: block;
        margin: 8px 0;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        background: #f1f5f9;
        transition: 0.2s;
      }

      .options label:hover {
        background: #e3f2fd;
      }

      .btn-group {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 24px;
      }

      button {
        padding: 12px 22px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        color: white;
      }

      .submit-btn {
        background: #2e7d32;
      }

      .reset-btn {
        background: #c62828;
      }

      #result {
        margin-top: 24px;
        padding: 18px;
        border-radius: 10px;
        background: #e8f5e9;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        display: none;
      }

      .correct {
        background: #d4edda !important;
        border: 1px solid #28a745;
      }

      .wrong {
        background: #f8d7da !important;
        border: 1px solid #dc3545;
      }

      .answer-note {
        margin-top: 10px;
        font-size: 14px;
        color: #333;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>जनवरी 2026 करेंट अफेयर्स क्विज</h1>
      <p class="subtitle">PDF से चुने गए 30 प्रश्न - हिंदी क्विज</p>

      <form id="quizForm"></form>

      <div class="btn-group">
        <button type="button" class="submit-btn" onclick="submitQuiz()">
          परिणाम देखें
        </button>
        <button type="button" class="reset-btn" onclick="resetQuiz()">
          रीसेट करें
        </button>
      </div>

      <div id="result"></div>
    </div>

    <script>
      const quizData = [
        {
          q: "1. दुनिया का सबसे बड़ा मखाना उत्पादक देश कौन बन गया है?",
          options: ["अमेरिका", "यूके", "रूस", "भारत"],
          answer: 3,
        },
        {
          q: "2. इजरायल के प्रधानमंत्री बेंजामिन नेतन्याहू ने 2026 में Israel Prize किसे देने की घोषणा की है?",
          options: [
            "जुबिन मेहता",
            "डोनाल्ड ट्रंप",
            "नरेंद्र मोदी",
            "शहबाज़ शरीफ",
          ],
          answer: 1,
        },
        {
          q: "3. काशी तमिल संगमम 4.0 का आयोजन कहाँ किया गया था?",
          options: [
            "नई दिल्ली",
            "वाराणसी",
            "रामेश्वरम",
            "उपरोक्त में से एक से अधिक",
          ],
          answer: 1,
        },
        {
          q: "4. कौन सा देश पारंपरिक डाक सेवा को बंद करने वाला पहला देश बन गया है?",
          options: ["इंग्लैंड", "डेनमार्क", "अमेरिका", "नॉर्वे"],
          answer: 1,
        },
        {
          q: "5. भारत आधिकारिक रूप से दुनिया की चौथी सबसे बड़ी अर्थव्यवस्था बन गया है, उसने किस देश को पीछे छोड़ा?",
          options: ["अमेरिका", "चीन", "जर्मनी", "जापान"],
          answer: 3,
        },
        {
          q: "6. बिहार के किस स्थान पर टाइगर रिजर्व स्थापना को सैद्धांतिक मंजूरी मिली है?",
          options: ["पश्चिमी चंपारण", "पूर्वी चंपारण", "कैमूर", "सासाराम"],
          answer: 2,
        },
        {
          q: "7. संजय गांधी जैविक उद्यान देश का किस नंबर का सबसे बड़ा चिड़ियाघर बन गया है?",
          options: ["पहला", "दूसरा", "तीसरा", "चौथा"],
          answer: 3,
        },
        {
          q: "8. कौन सा देश यूरोज़ोन का 21वां सदस्य बना है?",
          options: ["स्वीडन", "पोलैंड", "चेक गणराज्य", "बुल्गारिया"],
          answer: 3,
        },
        {
          q: "9. भारत में कौन सा राज्य अपना आठवां राज्य वेतन आयोग गठित करने वाला पहला राज्य बना है?",
          options: ["बिहार", "असम", "ओडिशा", "झारखंड"],
          answer: 1,
        },
        {
          q: "10. जनवरी 2026 में भारत में राष्ट्रव्यापी VoWiFi सेवाएं शुरू करने वाली सार्वजनिक क्षेत्र की दूरसंचार कंपनी कौन है?",
          options: ["एमटीएनएल", "बीएसएनएल", "बीबीएनएल", "रेलटेल"],
          answer: 1,
        },
        {
          q: "11. खेलो इंडिया बीच गेम्स के दूसरे संस्करण का उद्घाटन किस स्थान पर किया गया?",
          options: ["दीव", "बिलासपुर", "जयपुर", "नई दिल्ली"],
          answer: 0,
        },
        {
          q: "12. हाल ही में अंतरराष्ट्रीय सौर गठबंधन सहित 66 संगठनों से किस देश ने अपनी सदस्यता वापस ले ली है?",
          options: ["भारत", "इसराइल", "अमेरिका", "अर्जेंटीना"],
          answer: 2,
        },
        {
          q: "13. हाल ही में माधव गाडगिल का निधन हुआ, उनका संबंध किस क्षेत्र से था?",
          options: ["पर्यावरण संरक्षण", "साहित्य", "विज्ञान", "खेल"],
          answer: 0,
        },
        {
          q: "14. भारत ने हवाई खतरों से निपटने के लिए कौन सा मिशन लॉन्च किया है?",
          options: ["सूर्य चक्र", "सुदर्शन चक्र", "सोम चक्र", "कृष्ण चक्र"],
          answer: 1,
        },
        {
          q: "15. भारत की पहली पूरी तरह पेपरलेस जिला न्यायपालिका का उद्घाटन कहाँ हुआ था?",
          options: ["वायनाड", "बालोद", "अथिंकुंजाल", "पटना"],
          answer: 0,
        },
        {
          q: "16. भारत का पहला शहर कौन बना है जहाँ 24×7 पीने योग्य नल का पानी उपलब्ध है?",
          options: ["पटना", "पणजी", "पुरी", "पलक्कड़"],
          answer: 2,
        },
        {
          q: "17. हाल ही में संपन्न एशेज सीरीज किस देश ने जीती है?",
          options: ["ऑस्ट्रेलिया", "भारत", "इंग्लैंड", "बांग्लादेश"],
          answer: 0,
        },
        {
          q: "18. इटली ने अपनी सर्वोच्च नागरिक उपाधियों में से एक से किसे सम्मानित किया है?",
          options: [
            "रवि डीसी",
            "श्रीनिवास डेम्पो",
            "रेवती मोहिते डेरे",
            "स्वाति शांता कुमार",
          ],
          answer: 2,
        },
        {
          q: "19. महिला हॉकी एशिया कप 2025 में किस टीम ने स्वर्ण पदक जीता?",
          options: ["चीन", "भारत", "जापान", "मलेशिया"],
          answer: 1,
        },
        {
          q: "20. हाल ही में '1 बिलियन फॉलोअर्स समिट' कहाँ आयोजित किया गया?",
          options: ["नई दिल्ली", "जयपुर", "दुबई", "पेरिस"],
          answer: 2,
        },
        {
          q: "21. हाल ही में किस देश ने तैमूर नामक एयर-लॉन्च क्रूज मिसाइल का सफल परीक्षण किया?",
          options: ["ईरान", "अफगानिस्तान", "पाकिस्तान", "बांग्लादेश"],
          answer: 2,
        },
        {
          q: "22. नीति आयोग द्वारा भारत की अदरक राजधानी किसे घोषित किया गया है?",
          options: ["मिजोरम", "केरल", "असम", "पश्चिम बंगाल"],
          answer: 0,
        },
        {
          q: "23. हाल ही में किस राज्य सरकार ने 80 वर्ष या अधिक उम्र के लोगों के लिए जमीन या संपत्ति की निबंधन सेवा घर पर उपलब्ध कराने की घोषणा की है?",
          options: ["बिहार", "राजस्थान", "झारखंड", "मध्य प्रदेश"],
          answer: 1,
        },
        {
          q: "24. बिहार सरकार ने Start-up के लिए सीड फंड की राशि बढ़ाकर कितनी करने की घोषणा की है?",
          options: ["₹10 लाख", "₹15 लाख", "₹25 लाख", "₹50 लाख"],
          answer: 2,
        },
        {
          q: "25. विजय हजारे ट्रॉफी 2026 का खिताब किस क्रिकेट टीम ने जीता?",
          options: ["विदर्भ", "सौराष्ट्र", "झारखंड", "केरल"],
          answer: 0,
        },
        {
          q: "26. हाल ही में किस राज्य सरकार ने 'सेम्मोझि इलक्किय विरுது' राष्ट्रीय साहित्य पुरस्कार की घोषणा की है?",
          options: ["पश्चिम बंगाल", "तमिलनाडु", "ओडिशा", "केरल"],
          answer: 1,
        },
        {
          q: "27. भारत की पहली वंदे भारत स्लीपर ट्रेन किन दो स्टेशनों के बीच चली है?",
          options: [
            "मुंबई-अहमदाबाद",
            "हावड़ा-कामाख्या",
            "दिल्ली-वाराणसी",
            "चेन्नई-बेंगलुरु",
          ],
          answer: 1,
        },
        {
          q: "28. स्टेट बैंक ऑफ इंडिया की एक रिपोर्ट के अनुसार भारत किस वर्ष तक उच्च-मध्यम आय वाला देश बन जाएगा?",
          options: ["2027", "2030", "2047", "2050"],
          answer: 2,
        },
        {
          q: "29. विश्व आर्थिक मंच की वैश्विक जोखिम रिपोर्ट 2026 के अनुसार दुनिया किस युग में प्रवेश कर रही है?",
          options: [
            "प्रतिस्पर्धा के युग",
            "AI के युग",
            "समृद्धि के युग",
            "शांति के युग",
          ],
          answer: 0,
        },
        {
          q: "30. विश्व के सबसे बड़े अंतरराष्ट्रीय रंगमंच उत्सव भारत रंग महोत्सव का आयोजन कहाँ किया गया?",
          options: ["जयपुर", "नई दिल्ली", "भुवनेश्वर", "पटना"],
          answer: 1,
        },
      ];

      const form = document.getElementById("quizForm");

      quizData.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "question";
        div.id = "question-" + index;

        let optionsHtml = "";
        item.options.forEach((opt, i) => {
          optionsHtml += `
          <label>
            <input type="radio" name="q${index}" value="${i}">
            ${opt}
          </label>
        `;
        });

        div.innerHTML = `
        <h3>${item.q}</h3>
        <div class="options">${optionsHtml}</div>
        <div class="answer-note" id="note-${index}"></div>
      `;

        form.appendChild(div);
      });

      function submitQuiz() {
        let score = 0;

        quizData.forEach((item, index) => {
          const selected = document.querySelector(
            `input[name="q${index}"]:checked`,
          );
          const labels = document.querySelectorAll(`#question-${index} label`);
          const note = document.getElementById(`note-${index}`);

          labels.forEach((label) => {
            label.classList.remove("correct", "wrong");
          });

          if (selected) {
            const selectedValue = parseInt(selected.value);
            if (selectedValue === item.answer) {
              score++;
              labels[selectedValue].classList.add("correct");
              note.textContent = "सही उत्तर";
            } else {
              labels[selectedValue].classList.add("wrong");
              labels[item.answer].classList.add("correct");
              note.textContent =
                "गलत उत्तर | सही विकल्प: " + item.options[item.answer];
            }
          } else {
            labels[item.answer].classList.add("correct");
            note.textContent =
              "उत्तर नहीं चुना | सही विकल्प: " + item.options[item.answer];
          }
        });

        const result = document.getElementById("result");
        result.style.display = "block";
        result.innerHTML = `आपका स्कोर: ${score} / ${quizData.length}`;
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth",
        });
      }

      function resetQuiz() {
        document.getElementById("quizForm").reset();
        document.getElementById("result").style.display = "none";

        quizData.forEach((item, index) => {
          const labels = document.querySelectorAll(`#question-${index} label`);
          const note = document.getElementById(`note-${index}`);
          labels.forEach((label) => {
            label.classList.remove("correct", "wrong");
          });
          note.textContent = "";
        });

        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    </script>
  </body>
</html>
